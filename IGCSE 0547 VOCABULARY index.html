        // --- 1. AUDIO ENGINE (Web Audio API - No external files needed) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const sfx = {
            playTone: (freq, type, duration, volume = 0.1, ramp = false) => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                if (ramp) {
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                } else {
                    gain.gain.setValueAtTime(0, audioCtx.currentTime + duration);
                }

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            },

            ding: () => {
                // High pitch Chime (Sine wave with decay)
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, t);
                osc.frequency.exponentialRampToValueAtTime(800, t + 0.1); // Slight pitch drop for bell effect
                
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 1.5); // Long decay (1.5s)

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(t + 1.5);
            },

            dong: () => {
                // Low Thud (Triangle wave)
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.linearRampToValueAtTime(50, t + 0.3); // Pitch drops

                gain.gain.setValueAtTime(0.5, t);
                gain.gain.linearRampToValueAtTime(0.01, t + 0.3); // Short decay

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(t + 0.3);
            },

            click: () => {
                // Mechanical Click (Short square wave)
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const t = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'square';
                osc.frequency.setValueAtTime(600, t);
                
                gain.gain.setValueAtTime(0.05, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05); // Super short (50ms)

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(t + 0.05);
            }
        };

            updateProgress(hanzi, isCorrect) {
                if(!this.state.progress[hanzi]) {
                    this.state.progress[hanzi] = { seen: true, netScore: 0 };
                }
                if(isCorrect) {
                    this.state.progress[hanzi].netScore++;
                } else {
                    this.state.progress[hanzi].netScore = Math.max(0, this.state.progress[hanzi].netScore - 1);
                }
                localStorage.setItem('igcse_progress', JSON.stringify(this.state.progress));

            getPool() {
                if(this.state.selectedListId === -1) return this.state.customPool;
                if(this.state.selectedListId === null) return vocabularyData;
                return vocabularyData.filter(w => w.l === this.state.selectedListId);

            getRandomWords(count, pool) {
                if(!pool || pool.length === 0) pool = vocabularyData;

            createGameCard(title, subtitle, icon, action) {
                return `
                    <div onclick='${action}' class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-100 cursor-pointer active:scale-95 transition flex flex-col items-center text-center gap-2 md:gap-3 h-full justify-center">

                sfx.click();
                let mastered = 0, seen = 0, mistakeList = [];

                Object.keys(this.state.progress).forEach(h => {

                const root = document.getElementById('appRoot');
                root.innerHTML = `
                    <div class="max-w-4xl mx-auto pb-10">

                        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-6 mb-6">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-bold flex items-center gap-2">
                                    <span>⚠️ 错题本 / 待复习</span>
                                    <span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">${mistakeList.length}</span>
                                </h3>
                                ${mistakeList.length > 0 ? `<button onclick="app.startReviewGame()" class="text-blue-600 text-sm font-bold hover:underline">去练习这些词</button>` : ''}
                            </div>
                            <div class="max-h-64 overflow-y-auto no-scrollbar">

                                  `<div class="grid grid-cols-1 gap-2">
                                     ${mistakeList.map(w => `<div class="p-3 border rounded-xl bg-slate-50 flex justify-between items-center"><div class="flex flex-col"><span class="font-bold text-lg">${w.h}</span><span class="text-xs text-slate-500">${w.p}</span></div><span class="text-sm text-slate-600">${w.m}</span></div>`).join('')}

                             <button onclick="app.clearProgress()" class="text-red-400 text-sm hover:text-red-600 underline">清除所有进度</button>
                        </div>
                    </div>
                `;
                this.startReviewGame = () => {
                    this.state.selectedListId = -1;

            // --- QUIZ MODE SELECTION ---
            showQuizMode(gameType) {
                sfx.click();
                const root = document.getElementById('appRoot');
                root.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full max-w-md mx-auto">
                        <h2 class="text-2xl font-bold mb-8">选择${gameType === 'speed' ? '限时' : ''}题型</h2>
                        <button onclick="app.startGame('${gameType}', 'h2e')" class="w-full bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-4 hover:border-blue-500 transition text-left group">
                            <span class="block text-slate-400 text-xs font-bold uppercase mb-1">Mode A</span>
                            <span class="text-xl font-bold text-slate-800 group-hover:text-blue-600">看生词 → 选意思</span>
                            <span class="block text-slate-400 text-sm mt-1">例如：以前 → Before</span>
                        </button>
                        <button onclick="app.startGame('${gameType}', 'e2h')" class="w-full bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:border-blue-500 transition text-left group">
                            <span class="block text-slate-400 text-xs font-bold uppercase mb-1">Mode B</span>
                            <span class="text-xl font-bold text-slate-800 group-hover:text-blue-600">看意思 → 选生词</span>
                            <span class="block text-slate-400 text-sm mt-1">例如：Before → 以前</span>
                        </button>
                         <button onclick="app.renderGameMenu()" class="mt-8 text-slate-400">取消</button>
                    </div>
                `;
            },

            startGame(type, mode) {
                sfx.click();
                this.state.view = type;
                if(mode) this.state.quizDirection = mode;
                let pool = this.getPool();
                if(pool.length < 4 && type !== 'flash' && type !== 'write') {
                    alert("词汇量太少，无法开始此游戏 (至少需要4个词)");
                    this.renderGameMenu();
                    return;
                }
                
                if(type === 'match') this.initMatchGame(pool);
                if(type === 'fill') this.initFillGame(pool);
                if(type === 'quiz') this.initQuizGame(pool, false);
                if(type === 'speed') this.initQuizGame(pool, true);
                if(type === 'flash') this.initFlashGame(pool);
                if(type === 'write') this.initWriteGame(pool);
            },

            // --- GAME 1: MATCH (Face Up) ---
            initMatchGame(pool) {
                const words = this.getRandomWords(6, pool); // 6 pairs
                let cards = [];
                words.forEach((w, i) => {
                    cards.push({ id: `h_${i}`, content: w.h, type: 'h', matchId: i, original: w });
                    cards.push({ id: `m_${i}`, content: w.m, type: 'm', matchId: i, original: w });
                });
                cards.sort(() => 0.5 - Math.random());

                let selected = null;
                let matchedIds = [];

                const root = document.getElementById('appRoot');
                const renderGrid = () => {
                    let html = `<div class="grid grid-cols-3 md:grid-cols-4 gap-3 h-full content-center max-w-3xl mx-auto pb-10">`;
                    cards.forEach((c) => {
                        const isMatched = matchedIds.includes(c.matchId);
                        const isSelected = selected && selected.id === c.id;
                        const visibilityClass = isMatched ? 'opacity-0 pointer-events-none' : '';
                        const selectClass = isSelected ? 'card-selected ring-4 ring-blue-200' : 'bg-white border-slate-200 hover:border-blue-300';
                        const textStyle = c.type === 'h' ? 'text-xl md:text-2xl font-bold text-slate-800' : 'text-sm md:text-base text-slate-600 font-medium';

                        html += `
                            <div id="${c.id}" class="aspect-[4/3] rounded-xl shadow-sm border-2 cursor-pointer transition-all duration-200 flex items-center justify-center text-center p-2 ${visibilityClass} ${selectClass}" onclick="app.handleMatchClick('${c.id}')">
                                <span class="${textStyle}">${c.content}</span>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    root.innerHTML = html;
                };

                this.handleMatchClick = (id) => {
                    const card = cards.find(c => c.id === id);
                    if(!card || matchedIds.includes(card.matchId)) return;

                    if(!selected) {
                        selected = card;
                        renderGrid();
                        sfx.click(); // Click when selecting first card
                    } else {
                        if(selected.id === id) {
                            selected = null;
                            renderGrid();
                            return;
                        }

                        if(selected.matchId === card.matchId) {
                            // Correct
                            sfx.ding();
                            matchedIds.push(card.matchId);
                            this.updateProgress(card.original.h, true);
                            selected = null;
                            const el1 = document.getElementById(selected?.id || id);
                            const el2 = document.getElementById(card.id);
                            if(el1) el1.classList.add('pop', 'bg-green-100', 'border-green-500');
                            if(el2) el2.classList.add('pop', 'bg-green-100', 'border-green-500');
                            
                            setTimeout(() => {
                                renderGrid();
                                if(matchedIds.length === words.length) this.showWinModal();
                            }, 300);

                        } else {
                            // Wrong
                            sfx.dong();
                            const el1 = document.getElementById(selected.id);
                            const el2 = document.getElementById(card.id);
                            el1.classList.add('shake', 'bg-red-50', 'border-red-300');
                            el2.classList.add('shake', 'bg-red-50', 'border-red-300');
                            setTimeout(() => {
                                selected = null;
                                renderGrid();
                            }, 500);
                        }
                    }
                };
                renderGrid();
            },

            // --- GAME 2: FILL BLANK ---
            initFillGame(pool) {
                let currentIdx = 0;
                const questions = this.getRandomWords(5, pool);
                
                const renderQ = () => {
                    if(currentIdx >= questions.length) { this.showWinModal(); return; }
                    const q = questions[currentIdx];
                    const chars = q.h.split('');
                    let distractors = [];
                    while(distractors.length < 4) {
                        const r = vocabularyData[Math.floor(Math.random()*vocabularyData.length)].h;
                        if(r) { const char = r[0]; if(!chars.includes(char) && !distractors.includes(char)) distractors.push(char); }
                    }
                    const poolChars = [...chars, ...distractors].sort(() => 0.5 - Math.random());
                    let userSlots = Array(chars.length).fill(null);
                    
                    const root = document.getElementById('appRoot');
                    
                    const updateUI = (shake = false) => {
                        const pinyinHtml = this.state.pinyinVisible ? `<p class="text-blue-500 mb-6 text-xl">${q.p}</p>` : '<div class="h-6 mb-6"></div>';
                        
                        let slotsHtml = `<div class="flex gap-2 justify-center mb-10 ${shake ? 'shake' : ''}">`;
                        userSlots.forEach((char, i) => {
                            slotsHtml += `
                                <div onclick="app.undoSlot(${i})" class="w-14 h-14 border-b-4 ${char ? 'border-blue-500 text-blue-600' : 'border-slate-200'} flex items-center justify-center text-3xl font-bold cursor-pointer transition">
                                    ${char || ''}
                                </div>
                            `;
                        });
                        slotsHtml += `</div>`;

                        let poolHtml = `<div class="flex flex-wrap gap-3 justify-center max-w-sm mx-auto">`;
                        poolChars.forEach((char) => {
                             poolHtml += `
                                <button onclick="app.pickChar('${char}')" class="w-14 h-14 bg-white shadow-sm rounded-xl hover:bg-slate-50 font-bold text-xl border border-slate-200 active:scale-95 transition">
                                    ${char}
                                </button>
                             `;
                        });
                        poolHtml += `</div>`;

                        root.innerHTML = `
                            <div class="flex flex-col items-center justify-center h-full pb-20">
                                <h2 class="text-2xl md:text-3xl font-bold mb-2 text-center">${q.m}</h2>
                                ${pinyinHtml}
                                ${slotsHtml}
                                ${poolHtml}
                            </div>
                        `;
                    };

                    this.pickChar = (char) => {
                        sfx.click(); // Click on picking char
                        const emptyIndex = userSlots.findIndex(s => s === null);
                        if(emptyIndex !== -1) {
                            userSlots[emptyIndex] = char;
                            updateUI();
                            if(!userSlots.includes(null)) {
                                if(userSlots.join('') === q.h) {
                                    sfx.ding();
                                    this.updateProgress(q.h, true);
                                    setTimeout(() => { currentIdx++; renderQ(); }, 600);
                                } else {
                                    sfx.dong();
                                    this.updateProgress(q.h, false);
                                    updateUI(true);
                                    setTimeout(() => { userSlots = Array(chars.length).fill(null); updateUI(); }, 800);
                                }
                            }
                        }
                    };
                    this.undoSlot = (i) => { userSlots[i] = null; updateUI(); sfx.click(); };
                    updateUI();
                };
                renderQ();
            },

            // --- GAME 3 & 4: QUIZ (Std & Speed) ---
            initQuizGame(pool, isSpeed) {
                let currentIdx = 0;
                const questions = this.getRandomWords(10, pool);
                const mode = this.state.quizDirection; 

                const renderQ = () => {
                    if(currentIdx >= questions.length) { 
                        clearInterval(this.state.timer);
                        this.showWinModal(); 
                        return; 
                    }
                    const q = questions[currentIdx];
                    let options = [q];
                    while(options.length < 4) {
                        const r = vocabularyData[Math.floor(Math.random()*vocabularyData.length)];
                        if(r && !options.find(o => o.h === r.h)) options.push(r);
                    }
                    options.sort(() => 0.5 - Math.random());

                    const root = document.getElementById('appRoot');
                    
                    const questionText = mode === 'h2e' ? q.h : q.m;
                    const pinyinHtml = (mode === 'h2e' && this.state.pinyinVisible) ? `<div class="text-blue-500 text-xl mb-4">${q.p}</div>` : '';
                    
                    let timerHtml = '';
                    if(isSpeed) {
                         clearInterval(this.state.timer);
                         let timeLeft = 10;
                         timerHtml = `<div class="w-full max-w-md h-2 bg-slate-200 rounded-full mb-6 overflow-hidden"><div id="timeBar" class="h-full bg-blue-500 transition-all duration-100 ease-linear" style="width:100%"></div></div>`;
                         this.state.timer = setInterval(() => {
                            timeLeft -= 0.1;
                            const bar = document.getElementById('timeBar');
                            if(bar) bar.style.width = `${(timeLeft/10)*100}%`;
                            if(timeLeft <= 0) {
                                clearInterval(this.state.timer);
                                sfx.dong();
                                this.updateProgress(q.h, false);
                                document.getElementById('qContainer').classList.add('bg-red-50');
                                setTimeout(() => { currentIdx++; renderQ(); }, 1000);
                            }
                         }, 100);
                    }

                    let btns = `<div class="grid grid-cols-1 gap-3 w-full max-w-md">`;
                    options.forEach(opt => {
                        const btnText = mode === 'h2e' ? opt.m : opt.h;
                        btns += `
                            <button onclick="app.handleQuizAnswer('${opt.h}', '${q.h}')" class="p-5 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-blue-500 active:scale-98 transition text-lg font-medium text-left">
                                ${btnText}
                            </button>
                        `;
                    });
                    btns += `</div>`;

                    root.innerHTML = `
                        <div id="qContainer" class="flex flex-col items-center justify-center h-full w-full p-4 transition-colors duration-300 rounded-3xl">
                            ${timerHtml}
                            <div class="text-4xl md:text-5xl font-bold mb-4 text-slate-800 text-center">${questionText}</div>
                            ${pinyinHtml}
                            <div class="mt-8 w-full flex justify-center">${btns}</div>
                            <div class="mt-8 text-slate-300 text-sm font-bold tracking-widest">${currentIdx + 1} / ${questions.length}</div>
                        </div>
                    `;
                };

                this.handleQuizAnswer = (selected, correct) => {
                    clearInterval(this.state.timer);
                    const q = questions[currentIdx];
                    if(selected === correct) {
                        sfx.ding();
                        this.updateProgress(q.h, true);
                        currentIdx++; 
                        renderQ();
                    } else {
                        sfx.dong();
                        this.updateProgress(q.h, false);
                        const container = document.getElementById('qContainer');
                        container.classList.add('bg-red-50', 'shake');
                        setTimeout(() => {
                            container.classList.remove('shake', 'bg-red-50');
                            currentIdx++; 
                            renderQ();
                        }, 800);
                    }
                };
                renderQ();
            },

            // --- GAME 5: FLASHCARDS (Final) ---
            initFlashGame(pool) {
                let currentIdx = 0;
                const questions = pool; 
                
                const renderCard = () => {
                    if(currentIdx >= questions.length) { this.showWinModal(); return; }
                    const q = questions[currentIdx];
                    
                    const root = document.getElementById('appRoot');
                    root.innerHTML = `
                        <div class="flex flex-col items-center h-full justify-center pb-10">
                            <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 text-center w-full max-w-sm flex flex-col items-center gap-6 min-h-[300px] justify-center">
                                <h2 class="text-6xl font-bold text-slate-800">${q.h}</h2>
                                <div class="w-full h-px bg-slate-100"></div>
                                <div class="text-center">
                                    <p class="text-2xl font-bold text-blue-500 mb-2">${q.p}</p>
                                    <p class="text-xl text-slate-600">${q.m}</p>
                                </div>
                            </div>
                            
                            <div class="flex gap-4 mt-10 w-full max-w-xs">
                                <button onclick="app.nextFlashCard(false)" class="flex-1 py-4 bg-slate-200 text-slate-600 font-bold rounded-2xl active:scale-95 transition">
                                    下一个
                                </button>
                                <button onclick="app.nextFlashCard(true)" class="flex-1 py-4 bg-green-500 text-white font-bold rounded-2xl shadow-lg shadow-green-200 active:scale-95 transition">
                                    我记住了
                                </button>
                            </div>
                            <div class="mt-6 text-slate-300 font-bold text-sm">${currentIdx + 1} / ${questions.length}</div>
                        </div>
                    `;
                };

                this.nextFlashCard = (known) => {
                    if(known) {
                        sfx.ding();
                        this.updateProgress(questions[currentIdx].h, true);
                    } else {
                        sfx.click(); // Click sound for "Next"
                    }
                    currentIdx++;
                    renderCard();
                };
                renderCard();
            },

            // --- GAME 6: WRITING (Final) ---
            initWriteGame(pool) {
                let currentIdx = 0;
                const questions = this.getRandomWords(10, pool);

                const renderCanvas = () => {
                    if(currentIdx >= questions.length) { this.showWinModal(); return; }
                    const q = questions[currentIdx];
                    const chars = q.h.split('');
                    
                    const root = document.getElementById('appRoot');
                    
                    let canvasHtml = '';
                    chars.forEach((char, i) => {
                        canvasHtml += `
                            <div class="relative w-[140px] h-[140px] md:w-[160px] md:h-[160px]">
                                <div class="absolute inset-0 tian-zi-ge pointer-events-none z-0"></div>
                                <canvas id="c_${i}" width="160" height="160" class="relative z-10 w-full h-full cursor-crosshair touch-none"></canvas>
                                <div id="ans_${i}" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-300 z-0">
                                    <span class="text-[120px] font-hand text-red-500/40 leading-none">${char}</span>
                                </div>
                            </div>
                        `;
                    });

                    root.innerHTML = `
                        <div class="flex flex-col items-center h-full pt-4 pb-10">
                            <div class="text-center mb-6">
                                <h2 class="text-2xl font-bold text-slate-800">${q.m}</h2>
                                <p class="text-blue-500 text-lg font-medium mt-1">${q.p}</p>
                            </div>

                            <div class="flex flex-wrap justify-center gap-2 mb-8">
                                ${canvasHtml}
                            </div>

                            <div class="flex gap-3 mb-8">
                                <button onclick="app.clearCanvases(${chars.length})" class="px-5 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm font-bold">Clear</button>
                                <button onclick="app.showWritingAnswer(${chars.length})" class="px-5 py-2 bg-blue-50 text-blue-600 rounded-lg text-sm font-bold">Show Answer</button>
                            </div>

                            <div class="flex gap-4 w-full max-w-sm mt-auto">
                                <button onclick="app.rateWriting(false)" class="flex-1 py-3 bg-red-50 text-red-600 border border-red-100 font-bold rounded-xl active:scale-95 transition flex items-center justify-center gap-2">
                                    <span>✕</span> Incorrect
                                </button>
                                <button onclick="app.rateWriting(true)" class="flex-1 py-3 bg-green-500 text-white font-bold rounded-xl shadow-lg shadow-green-200 active:scale-95 transition flex items-center justify-center gap-2">
                                    <span>✓</span> Correct
                                </button>
                            </div>
                        </div>
                    `;

                    setTimeout(() => {
                        chars.forEach((_, i) => this.initCanvas(`c_${i}`));
                    }, 50);
                };

                this.initCanvas = (id) => {
                    const canvas = document.getElementById(id);
                    if(!canvas) return;
                    const ctx = canvas.getContext('2d');
                    ctx.lineWidth = 6;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = '#1e293b';

                    const rect = canvas.getBoundingClientRect();
                    canvas.width = rect.width;
                    canvas.height = rect.height;

                    let isDrawing = false;
                    const start = (e) => {
                        isDrawing = true;
                        ctx.beginPath();
                        const {x, y} = getPos(e);
                        ctx.moveTo(x, y);
                    };
                    const move = (e) => {
                        if(!isDrawing) return;
                        const {x, y} = getPos(e);
                        ctx.lineTo(x, y);
                        ctx.stroke();
                    };
                    const end = () => { isDrawing = false; };
                    const getPos = (e) => {
                        const r = canvas.getBoundingClientRect();
                        const t = e.touches ? e.touches[0] : e;
                        return { x: t.clientX - r.left, y: t.clientY - r.top };
                    };
                    canvas.addEventListener('mousedown', start);
                    canvas.addEventListener('mousemove', move);
                    canvas.addEventListener('mouseup', end);
                    canvas.addEventListener('touchstart', start, {passive: false});
                    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); }, {passive: false});
                    canvas.addEventListener('touchend', end);
                };

                this.clearCanvases = (count) => {
                    sfx.click();
                    for(let i=0; i<count; i++) {
                        const c = document.getElementById(`c_${i}`);
                        const ctx = c.getContext('2d');
                        ctx.clearRect(0, 0, c.width, c.height);
                    }
                };

                this.showWritingAnswer = (count) => {
                    sfx.click();
                    for(let i=0; i<count; i++) {
                        document.getElementById(`ans_${i}`).classList.remove('opacity-0');
                    }
                };

                this.rateWriting = (correct) => {
                    const q = questions[currentIdx];
                    if(!correct) {
                        sfx.dong();
                        this.updateProgress(q.h, false);
                    } else {
                        sfx.ding();
                        this.updateProgress(q.h, true);
                    }
                    currentIdx++;
                    renderCanvas();
                };
                renderCanvas();
            },

            showWinModal() {
                sfx.ding();
                const root = document.getElementById('appRoot');
                root.innerHTML += `
                    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                        <div class="bg-white p-8 rounded-3xl text-center shadow-2xl animate-bounce w-full max-w-sm">
                            <div class="text-6xl mb-4">🎉</div>
                            <h2 class="text-2xl font-bold mb-2 text-slate-800">完成练习!</h2>
                            <p class="text-slate-500 mb-6">Great job!</p>
                            <button onclick="app.renderGameMenu()" class="w-full bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition">返回菜单</button>
                        </div>
                    </div>
                `;
            }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
